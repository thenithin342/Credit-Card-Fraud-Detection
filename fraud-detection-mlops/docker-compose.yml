version: "3.9"

# This file is built incrementally across phases (see docs/ROADMAP.md).
# Phase 0 target: redpanda, redis, postgres, mlflow should come up healthy.
# Phase 3 adds: api. Phase 5 adds: prometheus, grafana.
# Phase 6 (Airflow) is intentionally NOT here — stand it up via Airflow's own
# official docker-compose stack per docs/ROADMAP.md Phase 6, then reference
# this network from it rather than merging the files.

services:

  # --- Phase 0: streaming backbone -----------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: fraud-mlops-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Phase 0/1: online feature store ---------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fraud-mlops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Phase 0/1: offline feature store + prediction log -----------------------
  postgres:
    image: postgres:16-alpine
    container_name: fraud-mlops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Phase 2: experiment tracking & model registry ----------------------------
  mlflow:
    build:
      context: ./infra/docker
      dockerfile: mlflow.Dockerfile
    container_name: fraud-mlops-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - postgres

  # --- Phase 3: scoring API (uncomment once src/serving has a real app) ----------
  # api:
  #   build:
  #     context: .
  #     dockerfile: infra/docker/api.Dockerfile
  #   container_name: fraud-mlops-api
  #   env_file: .env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - redis
  #     - postgres
  #     - mlflow

  # --- Phase 5: observability (uncomment once monitoring config exists) ----------
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: fraud-mlops-prometheus
  #   volumes:
  #     - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: fraud-mlops-grafana
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - prometheus

volumes:
  postgres_data:
  mlflow_data:
