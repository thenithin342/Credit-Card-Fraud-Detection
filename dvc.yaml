vars:
  - python: ".venv\\Scripts\\python"

stages:

  # ────────────────────────────────────────────────────────────────
  # Stage 1: ingest
  # Downloads IEEE-CIS and ULB datasets from Kaggle into data/raw/
  # ────────────────────────────────────────────────────────────────
  ingest:
    cmd: .venv\Scripts\python -m src.ingestion.download
    params:
      - params.yaml:
          - data.raw_dir
    outs:
      - data/raw/ieee-cis:
          cache: true
          persist: true
      - data/raw/ulb:
          cache: true
          persist: true

  # ────────────────────────────────────────────────────────────────
  # Stage 2: validate
  # Runs Great Expectations suites on raw data; fails fast on schema
  # violations or unexpected distributions.
  # ────────────────────────────────────────────────────────────────
  validate:
    cmd: .venv\Scripts\python -m src.validation.ge_suite
    deps:
      - data/raw/ieee-cis
      - data/raw/ulb
      - src/validation/ge_suite.py
    params:
      - params.yaml:
          - validation
          - data
    outs:
      - reports/validation:
          cache: false

  # ────────────────────────────────────────────────────────────────
  # Stage 3: split
  # Stratified train/val/test split; saves parquet files to
  # data/processed/  (DVC-tracked)
  # ────────────────────────────────────────────────────────────────
  split:
    cmd: .venv\Scripts\python -m src.ingestion.split
    deps:
      - data/raw/ieee-cis
      - src/ingestion/split.py
      - reports/validation
    params:
      - params.yaml:
          - split
          - data
          - features
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet

  # ────────────────────────────────────────────────────────────────
  # Stage 4: feature_engineer   (added in Phase 2)
  # ────────────────────────────────────────────────────────────────
  # feature_engineer:
  #   cmd: .venv\Scripts\python -m src.features.feature_engineering
  #   ...

  # ────────────────────────────────────────────────────────────────
  # Stage 5: train, Stage 6: evaluate  (added in Phase 3)
  # ────────────────────────────────────────────────────────────────
