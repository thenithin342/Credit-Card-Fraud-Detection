vars:
  - python: '.venv\Scripts\python'

stages:

  # Stage 1: ingest
  ingest:
    cmd: .venv\Scripts\python -m src.ingestion.download
    params:
      - data.raw_dir
    outs:
      - data/raw/ieee-cis
      - data/raw/ulb

  # Stage 2: validate
  validate:
    cmd: .venv\Scripts\python -m src.validation.ge_suite
    deps:
      - data/raw/ieee-cis
      - data/raw/ulb
      - src/validation/ge_suite.py
    params:
      - validation
      - data
    outs:
      - reports/validation

  # Stage 3: split
  split:
    cmd: .venv\Scripts\python -m src.ingestion.split
    deps:
      - data/raw/ieee-cis
      - src/ingestion/split.py
    params:
      - split
      - data
      - features
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet

  # Stage 4: feature_engineer (Phase 2B)
  feature_engineer:
    cmd: .venv\Scripts\python -m src.features.offline_store
    deps:
      - src/features/definitions.py
      - src/features/offline_store.py
      - src/features/selection.py
      - src/features/preprocessing.py
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
    params:
      - features
    outs:
      - data/features/train_features.parquet
      - data/features/val_features.parquet
      - data/features/test_features.parquet
      - models/encoders/feature_preprocessor.pkl
      - models/feature_columns.json