name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --prefer-binary \
            numpy pandas scikit-learn pyarrow \
            structlog python-dotenv pyyaml \
            pydantic pydantic-settings \
            matplotlib seaborn mlflow xgboost lightgbm fakeredis \
            pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Format check with ruff
        run: ruff format --check src/ tests/

      - name: Run unit tests (no real data required)
        run: pytest tests/unit/ -v --tb=short --ignore=tests/data_validation

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
